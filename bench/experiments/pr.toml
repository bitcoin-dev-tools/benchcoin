# Default PR-style experiment.
#
# Usage:
#   bench.py experiment run bench/experiments/pr.toml \
#     --datadir /data/pruned-840k --output-dir ./output

[experiment]
name = "pr"
outputs = ["results", "debug-plots"]

[benchmark]
full_ibd = true
runs = 1

[bitcoind]
stopatheight = 940000
chain = "main"
connect = "148.251.128.115:33333"
daemon = false
printtoconsole = false

[bitcoind.instrumented]
debug = ["coindb", "leveldb", "bench", "validation"]

[[subjects]]
name = "head"
commit = "HEAD"

[[profiles]]
name = "5000-uninstrumented"
dbcache = 5000
instrumentation = false
