# dbcache/maxsigcachesize sweep.
#
# Usage:
#   bench.py experiment run bench/experiments/pr.toml \
#     --datadir /data/pruned-840k --output-dir ./output

[experiment]
name = "pr"
outputs = ["results"]

[benchmark]
start_height = 840000
runs = 1

[bitcoind]
stopatheight = 900000
chain = "main"
connect = "148.251.128.115:33333"
prune = 1000000
daemon = false
printtoconsole = false

[[subjects]]
name = "head"
commit = "HEAD"

[[profiles]]
name = "db450-sig8"
dbcache = 450
instrumentation = false
[profiles.bitcoind]
maxsigcachesize = 8

[[profiles]]
name = "db450-sig32"
dbcache = 450
instrumentation = false
[profiles.bitcoind]
maxsigcachesize = 32

[[profiles]]
name = "db450-sig128"
dbcache = 450
instrumentation = false
[profiles.bitcoind]
maxsigcachesize = 128

[[profiles]]
name = "db4096-sig32"
dbcache = 4096
instrumentation = false
[profiles.bitcoind]
maxsigcachesize = 32

[[profiles]]
name = "db4096-sig128"
dbcache = 4096
instrumentation = false
[profiles.bitcoind]
maxsigcachesize = 128

[[profiles]]
name = "db4096-sig256"
dbcache = 4096
instrumentation = false
[profiles.bitcoind]
maxsigcachesize = 256

[[profiles]]
name = "db32000-sig32"
dbcache = 32000
instrumentation = false
[profiles.bitcoind]
maxsigcachesize = 32

[[profiles]]
name = "db32000-sig256"
dbcache = 32000
instrumentation = false
[profiles.bitcoind]
maxsigcachesize = 256

[[profiles]]
name = "db32000-sig512"
dbcache = 32000
instrumentation = false
[profiles.bitcoind]
maxsigcachesize = 512
