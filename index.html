<!DOCTYPE html>
<html>
  <head>
    <title>Bitcoin Core Nightly IBD Benchmark</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
      :root {
        --bg-primary: #f3f4f6;
        --bg-card: #ffffff;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --text-muted: #6b7280;
        --link-color: #2563eb;
        --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      }
      .dark {
        --bg-primary: #111827;
        --bg-card: #1f2937;
        --text-primary: #f9fafb;
        --text-secondary: #d1d5db;
        --text-muted: #9ca3af;
        --link-color: #60a5fa;
        --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.3);
      }
      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.2s, color 0.2s;
      }
      .card {
        background-color: var(--bg-card);
        box-shadow: var(--shadow);
        transition: background-color 0.2s;
      }
      .text-secondary { color: var(--text-secondary); }
      .text-muted { color: var(--text-muted); }
      .link { color: var(--link-color); }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        padding: 0.5rem;
        border-radius: 0.5rem;
        background-color: var(--bg-card);
        border: 1px solid var(--text-muted);
        cursor: pointer;
        font-size: 1.25rem;
        transition: background-color 0.2s;
      }
      .theme-toggle:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body class="p-4 md:p-8">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
      <span id="theme-icon">🌙</span>
    </button>
    <div class="w-full">
      <h1 class="text-3xl font-bold mb-2">Bitcoin Core Nightly IBD Benchmark</h1>
      <p class="text-secondary mb-4">
        IBD from a single networked peer from block 840,000 to 900,000 on a Hetzner AX52
      </p>
      <div class="card rounded-lg p-4">
        <div id="nightly-chart" style="width:100%; height:calc(100vh - 200px); min-height:400px;"></div>
      </div>
      <p class="text-sm text-muted mt-4 text-center">
        <a href="results/" class="link hover:underline">View PR benchmark results</a>
      </p>
    </div>
    <script>
      const data = [{"date": "2026-01-06", "commit": "a933b9c8438a147bcf851aa8285b34a214e24507", "config": "32000", "dbcache": 32000, "mean": 612.85576170434, "stddev": 4.998670222153479, "runs": 2}, {"date": "2026-01-06", "commit": "a933b9c8438a147bcf851aa8285b34a214e24507", "config": "450", "dbcache": 450, "mean": 702.9980965234399, "stddev": 9.525738866762428, "runs": 2}, {"date": "2026-01-07", "commit": "241f8607a40bdd98fcd86c8ace19844983b36b54", "config": "32000", "dbcache": 32000, "mean": 618.4414128441599, "stddev": 3.1666917827354943, "runs": 2}, {"date": "2026-01-07", "commit": "bd4f4782f23b59f8ddd608e1b5a3690e134f2a0e", "config": "32000", "dbcache": 32000, "mean": 2603.53606938938, "stddev": 3.1590848856682348, "runs": 2}, {"date": "2026-01-07", "commit": "241f8607a40bdd98fcd86c8ace19844983b36b54", "config": "450", "dbcache": 450, "mean": 713.9004484853001, "stddev": 7.556264783706519, "runs": 2}, {"date": "2026-01-07", "commit": "bd4f4782f23b59f8ddd608e1b5a3690e134f2a0e", "config": "450", "dbcache": 450, "mean": 3157.7827738555798, "stddev": 188.2899932724234, "runs": 2}];

      // Detect system preference and saved preference
      function getPreferredTheme() {
        const saved = localStorage.getItem('theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function setTheme(theme) {
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.getElementById('theme-icon').textContent = theme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', theme);
        updateChart(theme);
      }

      function toggleTheme() {
        const current = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        setTheme(current === 'dark' ? 'light' : 'dark');
      }

      // Colors that work well in both themes
      const colors = {
        '450': { line: '#3b82f6', error: 'rgba(59, 130, 246, 0.3)' },    // Blue
        '32000': { line: '#f97316', error: 'rgba(249, 115, 22, 0.3)' }   // Orange
      };

      // Convert seconds to minutes
      const toMinutes = (seconds) => seconds / 60;

      function buildTraces() {
        const smallData = data.filter(d => d.config === '450');
        const largeData = data.filter(d => d.config === '32000');
        const traces = [];

        if (smallData.length > 0) {
          traces.push({
            name: '450MB dbcache',
            x: smallData.map(d => d.date),
            y: smallData.map(d => toMinutes(d.mean)),
            text: smallData.map(d => d.commit.slice(0, 8)),
            customdata: smallData.map(d => [d.commit, toMinutes(d.stddev)]),
            hovertemplate: '<b>%{text}</b><br>%{y:.1f} min<br>±%{customdata[1]:.1f} min<extra>450MB</extra>',
            mode: 'lines+markers',
            line: { color: colors['450'].line, width: 2 },
            marker: { size: 8 },
            error_y: {
              type: 'data',
              array: smallData.map(d => toMinutes(d.stddev)),
              visible: true,
              color: colors['450'].error,
              thickness: 1.5
            }
          });
        }

        if (largeData.length > 0) {
          traces.push({
            name: '32GB dbcache',
            x: largeData.map(d => d.date),
            y: largeData.map(d => toMinutes(d.mean)),
            text: largeData.map(d => d.commit.slice(0, 8)),
            customdata: largeData.map(d => [d.commit, toMinutes(d.stddev)]),
            hovertemplate: '<b>%{text}</b><br>%{y:.1f} min<br>±%{customdata[1]:.1f} min<extra>32GB</extra>',
            mode: 'lines+markers',
            line: { color: colors['32000'].line, width: 2 },
            marker: { size: 8 },
            error_y: {
              type: 'data',
              array: largeData.map(d => toMinutes(d.stddev)),
              visible: true,
              color: colors['32000'].error,
              thickness: 1.5
            }
          });
        }

        return traces;
      }

      function getLayout(theme) {
        const isDark = theme === 'dark';
        return {
          title: {
            text: 'Sync from block 840,000 to 855,000',
            font: { size: 18, color: isDark ? '#f9fafb' : '#111827' }
          },
          xaxis: {
            title: { text: 'Date', font: { color: isDark ? '#d1d5db' : '#4b5563' } },
            tickangle: -45,
            tickfont: { color: isDark ? '#9ca3af' : '#6b7280' },
            gridcolor: isDark ? '#374151' : '#e5e7eb',
            linecolor: isDark ? '#4b5563' : '#d1d5db'
          },
          yaxis: {
            title: { text: 'Time (minutes)', font: { color: isDark ? '#d1d5db' : '#4b5563' } },
            rangemode: 'tozero',
            tickfont: { color: isDark ? '#9ca3af' : '#6b7280' },
            gridcolor: isDark ? '#374151' : '#e5e7eb',
            linecolor: isDark ? '#4b5563' : '#d1d5db'
          },
          legend: {
            orientation: 'h',
            yanchor: 'bottom',
            y: 1.02,
            xanchor: 'right',
            x: 1,
            font: { color: isDark ? '#d1d5db' : '#4b5563' }
          },
          hovermode: 'closest',
          hoverlabel: {
            bgcolor: isDark ? '#1f2937' : '#ffffff',
            bordercolor: isDark ? '#4b5563' : '#d1d5db',
            font: { color: isDark ? '#f9fafb' : '#111827', size: 13 }
          },
          margin: { t: 80, b: 80 },
          paper_bgcolor: 'rgba(0,0,0,0)',
          plot_bgcolor: 'rgba(0,0,0,0)'
        };
      }

      const config = {
        responsive: true,
        displayModeBar: 'hover',
        modeBarButtonsToRemove: ['lasso2d', 'select2d', 'autoScale2d'],
        displaylogo: false
      };

      function updateChart(theme) {
        Plotly.react('nightly-chart', buildTraces(), getLayout(theme), config);
      }

      // Initialize
      setTheme(getPreferredTheme());
    </script>
  </body>
</html>
