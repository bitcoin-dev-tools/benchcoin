<!DOCTYPE html>
<html>
  <head>
    <title>Bitcoin Core Nightly IBD Benchmark</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
      :root {
        --bg-primary: #f3f4f6;
        --bg-card: #ffffff;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --text-muted: #6b7280;
        --link-color: #2563eb;
        --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      }
      .dark {
        --bg-primary: #111827;
        --bg-card: #1f2937;
        --text-primary: #f9fafb;
        --text-secondary: #d1d5db;
        --text-muted: #9ca3af;
        --link-color: #60a5fa;
        --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.3);
      }
      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.2s, color 0.2s;
      }
      .card {
        background-color: var(--bg-card);
        box-shadow: var(--shadow);
        transition: background-color 0.2s;
      }
      .text-secondary { color: var(--text-secondary); }
      .text-muted { color: var(--text-muted); }
      .link { color: var(--link-color); }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        padding: 0.5rem;
        border-radius: 0.5rem;
        background-color: var(--bg-card);
        border: 1px solid var(--text-muted);
        cursor: pointer;
        font-size: 1.25rem;
        transition: background-color 0.2s;
      }
      .theme-toggle:hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body class="p-4 md:p-8">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
      <span id="theme-icon">🌙</span>
    </button>
    <div class="w-full">
      <h1 class="text-3xl font-bold mb-2">Bitcoin Core Nightly IBD Benchmark</h1>
      <p class="text-secondary mb-4">
        IBD from a single networked peer
      </p>
      <div class="card rounded-lg p-4">
        <div id="nightly-chart" style="width:100%; height:calc(100vh - 200px); min-height:400px;"></div>
      </div>
      <p class="text-sm text-muted mt-4 text-center">
        <a href="results/" class="link hover:underline">View PR benchmark results</a>
      </p>
    </div>
    <script>
      const data = [{"date": "2026-01-08", "commit": "bd4f4782f23b59f8ddd608e1b5a3690e134f2a0e", "mean": 3802.1192467214396, "stddev": 83.16079068825492, "config": "450", "series_key": "ryzen777008core|64GB|nvme|6.6|db450|840000-900000", "series_label": "x86_64, Ryzen 7 7700, 62GB RAM, 840000-900000, dbcache 450", "color_index": 9}, {"date": "2026-01-08", "commit": "bd4f4782f23b59f8ddd608e1b5a3690e134f2a0e", "mean": 2778.19841005334, "stddev": 3.6059343416583016, "config": "32000", "series_key": "ryzen777008core|64GB|nvme|6.6|db32000|840000-900000", "series_label": "x86_64, Ryzen 7 7700, 62GB RAM, 840000-900000, dbcache 32000", "color_index": 3}, {"date": "2026-01-09", "commit": "6c3fb719d1a8f34352e6518e28eda0f46ce54ce7", "mean": 3834.72160341028, "stddev": 164.23520351852275, "config": "450", "series_key": "ryzen777008core|64GB|nvme|6.6|db450|840000-900000", "series_label": "x86_64, Ryzen 7 7700, 62GB RAM, 840000-900000, dbcache 450", "color_index": 9}, {"date": "2026-01-09", "commit": "6c3fb719d1a8f34352e6518e28eda0f46ce54ce7", "mean": 2813.23517253976, "stddev": 12.599235597133521, "config": "32000", "series_key": "ryzen777008core|64GB|nvme|6.6|db32000|840000-900000", "series_label": "x86_64, Ryzen 7 7700, 62GB RAM, 840000-900000, dbcache 32000", "color_index": 3}, {"date": "2026-01-10", "commit": "6c3fb719d1a8f34352e6518e28eda0f46ce54ce7", "mean": 3808.74295071984, "stddev": 51.46634386171854, "config": "450", "series_key": "ryzen777008core|64GB|nvme|6.6|db450|840000-900000", "series_label": "x86_64, Ryzen 7 7700, 62GB RAM, 840000-900000, dbcache 450", "color_index": 9}, {"date": "2026-01-10", "commit": "aeaa67a9eac0decb89c60a67f9755ca10cbcc1d9", "mean": 3704.4353773922003, "stddev": 195.31656421572941, "config": "450", "series_key": "ryzen777008core|64GB|nvme|6.6|db450|840000-900000", "series_label": "x86_64, Ryzen 7 7700, 62GB RAM, 840000-900000, dbcache 450", "color_index": 9}, {"date": "2026-01-10", "commit": "6c3fb719d1a8f34352e6518e28eda0f46ce54ce7", "mean": 2699.87590591786, "stddev": 16.350081996243595, "config": "32000", "series_key": "ryzen777008core|64GB|nvme|6.6|db32000|840000-900000", "series_label": "x86_64, Ryzen 7 7700, 62GB RAM, 840000-900000, dbcache 32000", "color_index": 3}, {"date": "2026-01-10", "commit": "aeaa67a9eac0decb89c60a67f9755ca10cbcc1d9", "mean": 2757.26946200128, "stddev": 38.531909431387355, "config": "32000", "series_key": "ryzen777008core|64GB|nvme|6.6|db32000|840000-900000", "series_label": "x86_64, Ryzen 7 7700, 62GB RAM, 840000-900000, dbcache 32000", "color_index": 3}, {"date": "2026-01-11", "commit": "aeaa67a9eac0decb89c60a67f9755ca10cbcc1d9", "mean": 3854.8208417329397, "stddev": 34.950590901602766, "config": "450", "series_key": "ryzen777008core|64GB|nvme|6.6|db450|840000-900000", "series_label": "x86_64, Ryzen 7 7700, 62GB RAM, 840000-900000, dbcache 450", "color_index": 9}, {"date": "2026-01-11", "commit": "aeaa67a9eac0decb89c60a67f9755ca10cbcc1d9", "mean": 2763.49335186454, "stddev": 38.01082700536186, "config": "32000", "series_key": "ryzen777008core|64GB|nvme|6.6|db32000|840000-900000", "series_label": "x86_64, Ryzen 7 7700, 62GB RAM, 840000-900000, dbcache 32000", "color_index": 3}];

      // Detect system preference and saved preference
      function getPreferredTheme() {
        const saved = localStorage.getItem('theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function setTheme(theme) {
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.getElementById('theme-icon').textContent = theme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', theme);
        updateChart(theme);
      }

      function toggleTheme() {
        const current = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        setTheme(current === 'dark' ? 'light' : 'dark');
      }

      // Colorblind-friendly palette
      const PALETTE = [
        '#636EFA', '#EF553B', '#00CC96', '#AB63FA', '#FFA15A',
        '#19D3F3', '#FF6692', '#B6E880', '#FF97FF', '#FECB52'
      ];

      // Get color from pre-computed index (computed in Python using MD5)
      function getSeriesColor(colorIndex) {
        return PALETTE[colorIndex % PALETTE.length];
      }

      function getErrorColor(hexColor) {
        const r = parseInt(hexColor.slice(1, 3), 16);
        const g = parseInt(hexColor.slice(3, 5), 16);
        const b = parseInt(hexColor.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, 0.3)`;
      }

      // Convert seconds to minutes
      const toMinutes = (seconds) => seconds / 60;

      function buildTraces() {
        // Group data by series_key
        const seriesMap = new Map();

        data.forEach(d => {
          const key = d.series_key || d.config;  // Fallback for legacy data
          if (!seriesMap.has(key)) {
            seriesMap.set(key, {
              label: d.series_label || (d.config + ' dbcache'),
              colorIndex: d.color_index || 0,
              points: []
            });
          }
          seriesMap.get(key).points.push(d);
        });

        const traces = [];

        // Sort series by label for consistent legend order
        const sortedSeries = Array.from(seriesMap.entries())
          .sort((a, b) => a[1].label.localeCompare(b[1].label));

        sortedSeries.forEach(([seriesKey, series]) => {
          const points = series.points.sort((a, b) => a.date.localeCompare(b.date));
          const color = getSeriesColor(series.colorIndex);

          traces.push({
            name: series.label,
            x: points.map(d => d.date),
            y: points.map(d => toMinutes(d.mean)),
            text: points.map(d => d.commit.slice(0, 8)),
            customdata: points.map(d => [d.commit, toMinutes(d.stddev || 0)]),
            hovertemplate: '<b>%{text}</b><br>%{y:.1f} min<br>±%{customdata[1]:.1f} min<extra>' + series.label + '</extra>',
            mode: 'lines+markers',
            line: { color: color, width: 2 },
            marker: { size: 8 },
            error_y: {
              type: 'data',
              array: points.map(d => toMinutes(d.stddev || 0)),
              visible: true,
              color: getErrorColor(color),
              thickness: 1.5
            }
          });
        });

        return traces;
      }

      function getLayout(theme) {
        const isDark = theme === 'dark';
        return {
          title: {
            text: 'Sync from block 840,000 to 900,000',
            font: { size: 18, color: isDark ? '#f9fafb' : '#111827' }
          },
          xaxis: {
            title: { text: 'Date', font: { color: isDark ? '#d1d5db' : '#4b5563' } },
            tickangle: -45,
            tickfont: { color: isDark ? '#9ca3af' : '#6b7280' },
            gridcolor: isDark ? '#374151' : '#e5e7eb',
            linecolor: isDark ? '#4b5563' : '#d1d5db'
          },
          yaxis: {
            title: { text: 'Time (minutes)', font: { color: isDark ? '#d1d5db' : '#4b5563' } },
            rangemode: 'tozero',
            tickfont: { color: isDark ? '#9ca3af' : '#6b7280' },
            gridcolor: isDark ? '#374151' : '#e5e7eb',
            linecolor: isDark ? '#4b5563' : '#d1d5db'
          },
          legend: {
            orientation: 'h',
            yanchor: 'top',
            y: -0.15,
            xanchor: 'center',
            x: 0.5,
            font: { color: isDark ? '#d1d5db' : '#4b5563', size: 11 },
            bgcolor: isDark ? 'rgba(31, 41, 55, 0.8)' : 'rgba(255, 255, 255, 0.8)',
            bordercolor: isDark ? '#4b5563' : '#d1d5db',
            borderwidth: 1,
            itemclick: 'toggle',
            itemdoubleclick: 'toggleothers'
          },
          hovermode: 'closest',
          hoverlabel: {
            bgcolor: isDark ? '#1f2937' : '#ffffff',
            bordercolor: isDark ? '#4b5563' : '#d1d5db',
            font: { color: isDark ? '#f9fafb' : '#111827', size: 13 }
          },
          margin: { t: 80, b: 150 },
          paper_bgcolor: 'rgba(0,0,0,0)',
          plot_bgcolor: 'rgba(0,0,0,0)'
        };
      }

      const config = {
        responsive: true,
        displayModeBar: 'hover',
        modeBarButtonsToRemove: ['lasso2d', 'select2d', 'autoScale2d'],
        displaylogo: false
      };

      function updateChart(theme) {
        Plotly.react('nightly-chart', buildTraces(), getLayout(theme), config);
      }

      // Initialize
      setTheme(getPreferredTheme());
    </script>
  </body>
</html>
